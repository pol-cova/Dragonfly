name: Bug report
description: Report a bug in Dragonfly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please do **not** include live Drop answers or credentials.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. Go to ...
        3. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: version
    attributes:
      label: Node / pnpm version
      placeholder: "node 22.x, pnpm 10.x"
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - Convex backend
        - Midnight contract
        - Puzzles / drop-engine
        - Claim flow
        - Other
